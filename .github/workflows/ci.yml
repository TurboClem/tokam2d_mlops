name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check lint
        run: ruff check .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t tokam2d:${{ github.sha }} .

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag tokam2d:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/tokam2d:latest
          docker tag tokam2d:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/tokam2d:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tokam2d:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tokam2d:${{ github.sha }}
